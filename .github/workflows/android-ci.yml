name: Android CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android-app/**'
      - 'web-runtime/page-agent-unoone/**'
      - 'scripts/ci/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'android-app/**'
      - 'web-runtime/page-agent-unoone/**'
      - 'scripts/ci/**'
      - '.github/workflows/android-ci.yml'

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify UnoOne V2 repository invariants
        id: invariants
        shell: bash
        run: |
          set +e
          python3 scripts/ci/check_repo_invariants.py 2>&1 | tee unoone-invariants.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web-runtime/page-agent-unoone/package.json

      - name: Install PageAgent runtime dependencies
        working-directory: web-runtime/page-agent-unoone
        run: npm install --no-audit --no-fund

      - name: Typecheck PageAgent runtime
        working-directory: web-runtime/page-agent-unoone
        run: npm run typecheck

      - name: Test PageAgent runtime
        working-directory: web-runtime/page-agent-unoone
        run: npm test

      - name: Build PageAgent Android asset
        working-directory: web-runtime/page-agent-unoone
        run: npm run bundle:android

      - name: Verify PageAgent Android asset
        run: test -s android-app/UnoOneAgent/securebrowser/src/main/assets/page-agent/unoone-page-agent.js

      - name: Install Playwright Chromium
        working-directory: web-runtime/page-agent-unoone
        run: npx playwright install --with-deps chromium

      - name: Run PageAgent Playwright E2E
        id: e2e
        working-directory: web-runtime/page-agent-unoone
        shell: bash
        run: |
          set +e
          npm run test:e2e 2>&1 | tee playwright-e2e.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload PageAgent E2E diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: page-agent-e2e-diagnostics
          path: |
            web-runtime/page-agent-unoone/playwright-e2e.log
            web-runtime/page-agent-unoone/playwright-report/
            web-runtime/page-agent-unoone/test-results/
          retention-days: 14

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android-app/UnoOneAgent/**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        working-directory: android-app/UnoOneAgent
        run: chmod +x gradlew

      - name: Run Lint
        id: lint
        working-directory: android-app/UnoOneAgent
        shell: bash
        run: |
          set +e
          ./gradlew :app:lintDebug --stacktrace 2>&1 | tee android-lint.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run Unit Tests
        id: tests
        working-directory: android-app/UnoOneAgent
        shell: bash
        run: |
          set +e
          ./gradlew testDebugUnitTest --stacktrace 2>&1 | tee android-tests.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build Debug APK
        id: apk
        working-directory: android-app/UnoOneAgent
        shell: bash
        run: |
          set +e
          ./gradlew assembleDebug --stacktrace 2>&1 | tee android-apk.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload invariant diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unoone-invariant-diagnostics
          path: unoone-invariants.log
          retention-days: 14

      - name: Upload Android diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-ci-diagnostics
          path: |
            android-app/UnoOneAgent/android-lint.log
            android-app/UnoOneAgent/android-tests.log
            android-app/UnoOneAgent/android-apk.log
            android-app/UnoOneAgent/**/build/reports/lint-results-*.html
            android-app/UnoOneAgent/**/build/reports/lint-results-*.xml
            android-app/UnoOneAgent/**/build/reports/tests/
          retention-days: 14

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: steps.apk.outputs.status == '0'
        with:
          name: debug-apk
          path: android-app/UnoOneAgent/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Enforce all gates
        if: always()
        shell: bash
        run: |
          echo "invariants=${{ steps.invariants.outputs.status }} e2e=${{ steps.e2e.outputs.status }} lint=${{ steps.lint.outputs.status }} tests=${{ steps.tests.outputs.status }} apk=${{ steps.apk.outputs.status }}"
          if [[ "${{ steps.invariants.outputs.status }}" != "0" || \
                "${{ steps.e2e.outputs.status }}" != "0" || \
                "${{ steps.lint.outputs.status }}" != "0" || \
                "${{ steps.tests.outputs.status }}" != "0" || \
                "${{ steps.apk.outputs.status }}" != "0" ]]; then
            exit 1
          fi
