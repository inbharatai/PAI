[package]
name = "unoone-vault-core"
version = "0.1.0"
description = "UnoOne Pocket AI — Encrypted vault core library (Argon2id + XChaCha20-Poly1305)"
authors = ["InBharat Ai"]
edition = "2021"
license = "Proprietary"

[dependencies]
# Key derivation
argon2 = "0.5"

# Authenticated encryption
chacha20poly1305 = "0.10"

# Key derivation for domain keys
hkdf = "0.12"
hmac = "0.12"
sha2 = "0.10"

# Secure random generation
rand = "0.8"
rand_core = "0.6"

# Secure memory zeroing
zeroize = { version = "1", features = ["zeroize_derive"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Timestamps
chrono = { version = "0.4", features = ["serde"] }

# Stable IDs
uuid = { version = "1", features = ["v4"] }

# Hex encoding for hashes
hex = "0.4"

[dev-dependencies]
# Test utilities
tempfile = "3"